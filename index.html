<style>
#overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 9999; background: transparent;
}
</style>
<div id="overlay"></div>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<script>

}, { once: true });
